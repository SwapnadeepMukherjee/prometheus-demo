services:
    fastapi-app:
        build: ./app
        command: python app.py
        ports:
            - "5000:5000"
    prometheus:
      image: prom/prometheus
      volumes:
          - ./prometheous/prometheous.yml:/etc/prometheus/prometheus.yml
      ports:
          - "9090:9090"
      depends_on:
          - fastapi-app
    grafana:
      image: grafana/grafana:latest 
      ports:
          - "3000:3000"
      environment:
          - GF_SECURITY_ADMIN_PASSWORD=admin
      depends_on:
          - prometheus