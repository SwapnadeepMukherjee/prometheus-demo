name: Observability App CI/CD

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test Python App
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" # Adjust to your specific version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          # Install testing and linting tools
          pip install pytest flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
      - name: Run Tests
        run: |
          # Run pytest (ensure you have some basic tests in your repo)
          pytest

  docker-build-push:
      name: Build and Push Docker Image to ECR
      needs: build-and-test
      runs-on: ubuntu-22.04
      # Only run the push step when changes are merged/pushed to main
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-south-1 # Adjust to your target AWS region

        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2
    
        - name: Build, tag and push Docker Image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: prometheus-demo
            IMAGE_TAG: ${{ github.sha }}
          run: |
            # Build the Docker image
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
            
            # Push the image to AWS ECR
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
